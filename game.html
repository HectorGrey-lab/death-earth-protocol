<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dead Earth Protocol — Game</title>
<script>
  // Auth check — redirect to login if not authenticated
  (function() {
    try {
      var token = localStorage.getItem('de_token');
      var username = localStorage.getItem('de_username');
      if (!token || !username) {
        window.location.href = '/login';
      }
    } catch(e) {
      window.location.href = '/login';
    }
  })();
</script>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/galaxy.css" />
</head>
<body>
<!-- Chat toggle button + panel -->
  <div id="chatContainer"></div>

  <div id="app" class="app-shell">
    <header class="top-header panel">
      <div>
        <h1 id="gameTitle">Dead Earth Protocol</h1>
        <div class="subtitle">Ruined World Strategic Command Interface</div>
      </div>
      <div class="header-stats">
        <div class="stat-chip">
          <span class="label">Base Power</span>
          <strong id="headerBasePower">0</strong>
        </div>
        <div class="stat-chip">
          <span class="label">Population</span>
          <strong id="headerPopulation">0</strong>
        </div>
        <div class="stat-chip">
          <span class="label">Isotope Upkeep</span>
          <strong id="headerUpkeep">0/s</strong>
        </div>
        <div class="stat-chip">
          <span class="label">Commander Rank</span>
          <strong id="headerRank">Initiate</strong>
        </div>
      </div>
    </header>

    <nav class="panel command-nav">
      <button class="nav-btn" data-page="home">Command Center</button>
      <button class="nav-btn" data-page="map">World Map</button>
      <button class="nav-btn" data-page="buildings">Buildings</button>
      <button class="nav-btn" data-page="forces">Forces</button>
      <button class="nav-btn" data-page="research">Research</button>
      <button class="nav-btn" data-page="missions">Missions</button>
      <button class="nav-btn" data-page="alliance">Alliance</button>
      <button class="nav-btn" data-page="market">Market</button>
      <button class="nav-btn" data-page="mailbox">Mailbox</button>
    </nav>

    <div class="dashboard-grid">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-title">Resource Network</div>
          <div id="resourcePanel"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Shield Status</div>
          <div id="shieldPanel"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Queue Relay</div>
          <div id="queuePanel"></div>
        </section>

        <section class="panel">
                  <div class="panel-title">System Log</div>
                  <div id="systemLogPanel"></div>
                </section>
              </aside>

      <main class="main-stage">
        <section class="panel page-panel">
          <div class="page-header">
            <div>
              <div class="panel-title">Active View</div>
              <h2 id="pageTitle">Command Center</h2>
            </div>
            <div id="pageSubtitle" class="small">Strategic overview of colony operations.</div>
          </div>
          <div id="pageContent"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal panel">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button id="modalCloseBtn" class="btn small danger">Close</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/universe.js"></script>
  <script src="js/utils.js"></script>

  <script src="js/systems/resources.js"></script>
  <script src="js/systems/buildings.js"></script>
  <script src="js/systems/troops.js"></script>
  <script src="js/systems/research.js"></script>
  <script src="js/systems/combat.js"></script>
  <script src="js/systems/mailbox.js"></script>
  <script src="js/systems/alliance.js"></script>
  <script src="js/systems/events.js"></script>
  <script src="js/systems/map.js"></script>
  <script src="js/systems/expeditions.js"></script>
  <script src="js/systems/market.js"></script>
  <script src="js/systems/commander.js"></script>
  <script src="js/systems/missions.js"></script>
  <script src="js/systems/travel.js"></script>
  <script src="js/systems/galaxy.js"></script>

  <script src="js/ui/ui-core.js"></script>
  <script src="js/ui/ui-resources.js"></script>
  <script src="js/ui/ui-commander.js"></script>
  <script src="js/ui/ui-home.js"></script>
  <script src="js/ui/ui-map.js"></script>
  <script src="js/ui/ui-buildings.js"></script>
  <script src="js/ui/ui-forces.js"></script>
  <script src="js/ui/ui-research.js"></script>
  <script src="js/ui/ui-alliance.js"></script>
  <script src="js/ui/ui-market.js"></script>
  <script src="js/ui/ui-mailbox.js"></script>
  <script src="js/ui/ui-modal.js"></script>
  <script src="js/ui/ui-missions.js"></script>
  <script src="js/ui/ui-alerts.js"></script>

  <script src="js/network.js"></script>
  <script src="js/ui/ui-chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
